<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Silas.fm</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0e0e0f;
  --bg2: #161618;
  --bg3: #1e1e21;
  --bg4: #26262b;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0efe8;
  --text2: #9a9896;
  --text3: #5c5b59;
  --accent: #e8854a;
  --accent2: #c96b30;
  --green: #6abf7b;
  --red: #d95c4a;
  --radius: 10px;
  --radius-sm: 6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:54px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;backdrop-filter:blur(8px)}
.logo{font-family:'DM Serif Display',serif;font-size:20px;color:var(--accent);letter-spacing:-0.5px}
.logo em{font-style:italic;color:var(--text)}
.nav-links{display:flex;gap:2px}
.nav-btn{background:none;border:none;padding:6px 14px;border-radius:var(--radius-sm);color:var(--text2);font-size:13px;font-weight:400;transition:all 0.15s}
.nav-btn:hover{color:var(--text);background:var(--bg3)}
.nav-btn.active{color:var(--text);background:var(--bg3);font-weight:500}

/* PAGES */
.page{display:none;min-height:calc(100vh - 54px);padding:32px 28px}
.page.active{display:block}

/* HOME */
.home-header{max-width:640px;margin:0 auto 40px;text-align:center;padding-top:24px}
.home-header h1{font-family:'DM Serif Display',serif;font-size:42px;line-height:1.1;margin-bottom:10px;letter-spacing:-1px}
.home-header h1 em{font-style:italic;color:var(--accent)}
.home-header p{color:var(--text2);font-size:15px}

/* ADD SONG FORM */
.add-form-wrap{max-width:600px;margin:0 auto 48px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.add-form-wrap h2{font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3)}
.form-group input,.form-group select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;color:var(--text);font-size:13px;outline:none;transition:border-color 0.15s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent2)}
.form-group input::placeholder{color:var(--text3)}
.form-group select option{background:var(--bg3)}
.tag-input-row{display:flex;gap:8px;align-items:flex-start}
.tag-input-row input{flex:1}
.tag-add-btn{background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text2);font-size:13px;white-space:nowrap;transition:all 0.15s}
.tag-add-btn:hover{border-color:var(--border2);color:var(--text)}
.tag-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;min-height:24px}
.tag-pill{background:var(--bg4);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px}
.tag-pill .remove{cursor:pointer;color:var(--text3);font-size:13px;line-height:1;transition:color 0.1s}
.tag-pill .remove:hover{color:var(--red)}
.submit-btn{width:100%;margin-top:14px;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:10px;color:#fff;font-size:14px;font-weight:500;transition:background 0.15s}
.submit-btn:hover{background:var(--accent2)}
.submit-btn:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed}

/* RECENT */
.recent-section{max-width:600px;margin:0 auto}
.section-heading{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:12px}
.song-list{display:flex;flex-direction:column;gap:1px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.song-row{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--bg2);transition:background 0.1s}
.song-row:hover{background:var(--bg3)}
.song-row:not(:last-child){border-bottom:1px solid var(--border)}
.sr-info{flex:1;min-width:0}
.sr-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-sub{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-tags{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.sr-tag{background:var(--bg4);border:1px solid var(--border);border-radius:20px;padding:2px 8px;font-size:10px;color:var(--text2)}
.rating-chip{font-size:12px;font-weight:500;padding:3px 8px;border-radius:var(--radius-sm);background:var(--bg4);color:var(--text);min-width:36px;text-align:center;font-variant-numeric:tabular-nums}
.rating-chip.high{background:rgba(106,191,123,0.15);color:var(--green)}
.rating-chip.mid{background:rgba(232,133,74,0.15);color:var(--accent)}
.rating-chip.low{background:rgba(217,92,74,0.15);color:var(--red)}
.rating-chip.na{color:var(--text3);background:var(--bg4)}
.delete-btn{background:none;border:none;color:var(--text3);font-size:14px;padding:2px 5px;border-radius:4px;transition:color 0.1s;opacity:0;line-height:1}
.song-row:hover .delete-btn{opacity:1}
.delete-btn:hover{color:var(--red)}

/* PAGE HEADERS */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.page-title{font-family:'DM Serif Display',serif;font-size:28px;letter-spacing:-0.5px}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.ctrl-select{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-size:12px;outline:none;cursor:pointer}
.ctrl-select:focus{border-color:var(--accent2)}
.ctrl-select option{background:var(--bg2)}
.filter-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-tag{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--text2);cursor:pointer;transition:all 0.15s}
.filter-tag:hover{border-color:var(--border2);color:var(--text)}
.filter-tag.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ALBUMS GRID */
.albums-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.album-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all 0.15s}
.album-card:hover{background:var(--bg3);border-color:var(--border2)}
.ac-art{width:100%;aspect-ratio:1;background:var(--bg4);border-radius:var(--radius-sm);margin-bottom:12px;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--text3)}
.ac-title{font-size:13px;font-weight:500;line-height:1.3;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ac-artist{font-size:11px;color:var(--text2);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ac-footer{display:flex;align-items:center;justify-content:space-between}
.ac-count{font-size:10px;color:var(--text3)}

/* ARTISTS GRID */
.artists-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.artist-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all 0.15s}
.artist-card:hover{background:var(--bg3);border-color:var(--border2)}
.artist-avatar{width:56px;height:56px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:22px;color:var(--text2);margin-bottom:10px}
.artist-name{font-size:13px;font-weight:500;margin-bottom:2px}
.artist-meta{font-size:11px;color:var(--text2)}

/* DETAIL VIEWS */
.detail-back{background:none;border:none;color:var(--text2);font-size:13px;padding:0;margin-bottom:20px;display:flex;align-items:center;gap:6px;transition:color 0.15s}
.detail-back:hover{color:var(--text)}
.detail-header{margin-bottom:24px}
.detail-header h2{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-0.5px;margin-bottom:2px}
.detail-header p{color:var(--text2);font-size:13px}
.detail-header .big-rating{font-size:18px;font-weight:500;margin-top:8px}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty p{font-size:15px;margin-bottom:6px;color:var(--text2)}
.empty span{font-size:13px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 18px;font-size:13px;color:var(--text);transition:transform 0.25s cubic-bezier(.34,1.56,.64,1);z-index:200;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<nav>
  <div class="logo">Silas<em>.fm</em></div>
  <div class="nav-links">
    <button class="nav-btn active" onclick="showPage('home')">Home</button>
    <button class="nav-btn" onclick="showPage('songs')">Songs</button>
    <button class="nav-btn" onclick="showPage('albums')">Albums</button>
    <button class="nav-btn" onclick="showPage('artists')">Artists</button>
  </div>
</nav>

<!-- HOME -->
<div id="page-home" class="page active">
  <div class="home-header">
    <h1>Your music,<br/><em>rated.</em></h1>
    <p>Log a song, score it, tag it. It files itself.</p>
  </div>

  <div class="add-form-wrap">
    <h2>Add a song</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Song title *</label>
        <input id="f-title" type="text" placeholder="e.g. Lua"/>
      </div>
      <div class="form-group">
        <label>Artist *</label>
        <input id="f-artist" type="text" placeholder="e.g. Bright Eyes"/>
      </div>
      <div class="form-group">
        <label>Album *</label>
        <input id="f-album" type="text" placeholder="e.g. I'm Wide Awake…"/>
      </div>
      <div class="form-group">
        <label>Rating (1–10) *</label>
        <input id="f-rating" type="number" min="1" max="10" step="0.1" placeholder="e.g. 9.2"/>
      </div>
    </div>
    <div class="form-group">
      <label>Tags (genre, mood, era…)</label>
      <div class="tag-input-row">
        <input id="f-tag-input" type="text" placeholder="e.g. indie folk" onkeydown="tagKeydown(event)"/>
        <button class="tag-add-btn" onclick="addTag()">+ Add tag</button>
      </div>
      <div class="tag-pills" id="tag-pills"></div>
    </div>
    <button class="submit-btn" onclick="submitSong()">Log song</button>
  </div>

  <div class="recent-section">
    <div class="section-heading">Recently added</div>
    <div id="recent-list">
      <div class="empty"><p>No songs yet.</p><span>Add your first one above.</span></div>
    </div>
  </div>
</div>

<!-- SONGS PAGE -->
<div id="page-songs" class="page">
  <div class="page-header">
    <div class="page-title">Songs</div>
    <div class="controls">
      <select class="ctrl-select" id="song-sort" onchange="renderSongs()">
        <option value="date-desc">Newest first</option>
        <option value="rating-desc">Highest rated</option>
        <option value="rating-asc">Lowest rated</option>
        <option value="title-asc">A–Z</option>
      </select>
    </div>
  </div>
  <div class="filter-tags" id="songs-filter-tags"></div>
  <div id="songs-list"></div>
</div>

<!-- ALBUMS PAGE -->
<div id="page-albums" class="page">
  <div id="albums-main">
    <div class="page-header">
      <div class="page-title">Albums</div>
      <div class="controls">
        <select class="ctrl-select" id="album-sort" onchange="renderAlbums()">
          <option value="rating-desc">Highest rated</option>
          <option value="rating-asc">Lowest rated</option>
          <option value="title-asc">A–Z</option>
        </select>
        <select class="ctrl-select" id="album-artist-filter" onchange="renderAlbums()">
          <option value="">All artists</option>
        </select>
      </div>
    </div>
    <div id="albums-grid"></div>
  </div>
  <div id="album-detail" style="display:none"></div>
</div>

<!-- ARTISTS PAGE -->
<div id="page-artists" class="page">
  <div id="artists-main">
    <div class="page-header">
      <div class="page-title">Artists</div>
      <div class="controls">
        <select class="ctrl-select" id="artist-sort" onchange="renderArtists()">
          <option value="rating-desc">Highest rated</option>
          <option value="rating-asc">Lowest rated</option>
          <option value="name-asc">A–Z</option>
        </select>
      </div>
    </div>
    <div id="artists-grid"></div>
  </div>
  <div id="artist-detail" style="display:none"></div>
  <div id="artist-album-detail" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ────────────────────────────────────────────────────────────────
let songs = JSON.parse(localStorage.getItem('silasfm-songs') || '[]');
let pendingTags = [];

function save() {
  localStorage.setItem('silasfm-songs', JSON.stringify(songs));
}

// ── UTILITIES ───────────────────────────────────────────────────────────
function ratingClass(r) {
  if (r === null) return 'na';
  if (r >= 8) return 'high';
  if (r >= 6) return 'mid';
  return 'low';
}

function ratingLabel(r) {
  if (r === null) return 'N/A';
  return r.toFixed(1);
}

function avg(arr) {
  if (!arr.length) return null;
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function initials(name) {
  return name.split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── NAVIGATION ──────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>{
    if(b.textContent.toLowerCase().trim()===name||
       (name==='home'&&b.textContent.toLowerCase().trim()==='home')) b.classList.add('active');
  });
  // reset sub-views
  if(name==='albums'){showAlbumsMain();}
  if(name==='artists'){showArtistsMain();}
  if(name==='songs') renderSongs();
  if(name==='albums') renderAlbums();
  if(name==='artists') renderArtists();
  if(name==='home') renderRecent();
}

// ── TAG INPUT ───────────────────────────────────────────────────────────
function addTag() {
  const inp = document.getElementById('f-tag-input');
  const val = inp.value.trim().toLowerCase();
  if(!val || pendingTags.includes(val)) { inp.value=''; return; }
  pendingTags.push(val);
  inp.value='';
  renderTagPills();
}

function tagKeydown(e) {
  if(e.key==='Enter'||e.key===',') { e.preventDefault(); addTag(); }
}

function removeTag(i) {
  pendingTags.splice(i,1);
  renderTagPills();
}

function renderTagPills() {
  const c = document.getElementById('tag-pills');
  c.innerHTML = pendingTags.map((t,i)=>
    `<span class="tag-pill">${escHtml(t)}<span class="remove" onclick="removeTag(${i})">×</span></span>`
  ).join('');
}

// ── ADD SONG ────────────────────────────────────────────────────────────
function submitSong() {
  const title  = document.getElementById('f-title').value.trim();
  const artist = document.getElementById('f-artist').value.trim();
  const album  = document.getElementById('f-album').value.trim();
  const rRaw   = document.getElementById('f-rating').value.trim();

  if(!title||!artist||!album) { showToast('Please fill in title, artist, and album.'); return; }

  const rating = parseFloat(rRaw);
  if(isNaN(rating)||rating<1||rating>10) { showToast('Rating must be between 1 and 10.'); return; }
  const rRound = Math.round(rating*10)/10;

  songs.unshift({
    id: Date.now(),
    title, artist, album,
    rating: rRound,
    tags: [...pendingTags],
    date: Date.now()
  });
  save();

  // reset
  document.getElementById('f-title').value='';
  document.getElementById('f-artist').value='';
  document.getElementById('f-album').value='';
  document.getElementById('f-rating').value='';
  pendingTags=[];
  renderTagPills();
  renderRecent();
  showToast(`"${title}" logged at ${rRound.toFixed(1)}`);
}

// ── RENDER HELPERS ──────────────────────────────────────────────────────
function ratingChipHtml(r) {
  const cls = ratingClass(r);
  return `<span class="rating-chip ${cls}">${ratingLabel(r)}</span>`;
}

function songRowHtml(s, showDelete=false) {
  const del = showDelete ? `<button class="delete-btn" onclick="deleteSong(${s.id})" title="Delete">✕</button>` : '';
  const tags = s.tags.map(t=>`<span class="sr-tag">${escHtml(t)}</span>`).join('');
  return `<div class="song-row">
    <div class="sr-info">
      <div class="sr-title">${escHtml(s.title)}</div>
      <div class="sr-sub">${escHtml(s.artist)} · ${escHtml(s.album)}</div>
    </div>
    <div class="sr-tags">${tags}</div>
    ${ratingChipHtml(s.rating)}
    ${del}
  </div>`;
}

function deleteSong(id) {
  songs = songs.filter(s=>s.id!==id);
  save();
  renderRecent();
  renderSongs();
  renderAlbumArtistFilters();
}

// ── RECENT ──────────────────────────────────────────────────────────────
function renderRecent() {
  const c = document.getElementById('recent-list');
  if(!songs.length) {
    c.innerHTML=`<div class="empty"><p>No songs yet.</p><span>Add your first one above.</span></div>`;
    return;
  }
  const recent = songs.slice(0,8);
  c.innerHTML=`<div class="song-list">${recent.map(s=>songRowHtml(s,true)).join('')}</div>`;
}

// ── SONGS PAGE ──────────────────────────────────────────────────────────
let activeTagFilters = new Set();

function renderSongs() {
  // build tag filter bar
  const allTags = [...new Set(songs.flatMap(s=>s.tags))].sort();
  const filterBar = document.getElementById('songs-filter-tags');
  filterBar.innerHTML = allTags.map(t=>
    `<span class="filter-tag${activeTagFilters.has(t)?' active':''}" onclick="toggleTagFilter('${escHtml(t)}')">${escHtml(t)}</span>`
  ).join('');

  let filtered = activeTagFilters.size
    ? songs.filter(s=>s.tags.some(t=>activeTagFilters.has(t)))
    : songs;

  const sort = document.getElementById('song-sort').value;
  filtered = [...filtered];
  if(sort==='rating-desc') filtered.sort((a,b)=>b.rating-a.rating);
  else if(sort==='rating-asc') filtered.sort((a,b)=>a.rating-b.rating);
  else if(sort==='title-asc') filtered.sort((a,b)=>a.title.localeCompare(b.title));
  else filtered.sort((a,b)=>b.date-a.date);

  const c = document.getElementById('songs-list');
  if(!filtered.length) {
    c.innerHTML=`<div class="empty"><p>No songs match.</p></div>`;
    return;
  }
  c.innerHTML=`<div class="song-list">${filtered.map(s=>songRowHtml(s,true)).join('')}</div>`;
}

function toggleTagFilter(tag) {
  if(activeTagFilters.has(tag)) activeTagFilters.delete(tag);
  else activeTagFilters.add(tag);
  renderSongs();
}

// ── ALBUM HELPERS ────────────────────────────────────────────────────────
function buildAlbums() {
  const map = {};
  songs.forEach(s=>{
    // key: album+artist (normalized)
    const key = s.album.toLowerCase()+'|||'+s.artist.toLowerCase();
    if(!map[key]) map[key]={album:s.album,artist:s.artist,songs:[]};
    map[key].songs.push(s);
  });
  return Object.values(map).map(a=>{
    const ratings = a.songs.map(s=>s.rating);
    const r = ratings.length>=4 ? avg(ratings) : null;
    return {...a, rating:r?Math.round(r*10)/10:null, songCount:ratings.length};
  });
}

// Collaborative albums: if same album title appears under different primary artists, cross-list
function getAlbumsForArtist(artist, allAlbums) {
  const norm = artist.toLowerCase();
  return allAlbums.filter(a=> a.artist.toLowerCase()===norm);
}

function renderAlbumArtistFilters() {
  const artists = [...new Set(songs.map(s=>s.artist))].sort();
  const sel = document.getElementById('album-artist-filter');
  const cur = sel.value;
  sel.innerHTML=`<option value="">All artists</option>`+
    artists.map(a=>`<option value="${escHtml(a)}"${a===cur?'selected':''}>${escHtml(a)}</option>`).join('');
}

// ── ALBUMS PAGE ──────────────────────────────────────────────────────────
function renderAlbums() {
  renderAlbumArtistFilters();
  let albums = buildAlbums();

  const artistFilter = document.getElementById('album-artist-filter').value;
  if(artistFilter) albums = albums.filter(a=>a.artist===artistFilter);

  const sort = document.getElementById('album-sort').value;
  if(sort==='rating-desc') albums.sort((a,b)=>(b.rating??-1)-(a.rating??-1));
  else if(sort==='rating-asc') albums.sort((a,b)=>(a.rating??99)-(b.rating??99));
  else albums.sort((a,b)=>a.album.localeCompare(b.album));

  const c = document.getElementById('albums-grid');
  if(!albums.length){
    c.innerHTML=`<div class="empty"><p>No albums yet.</p><span>Log at least one song with an album name.</span></div>`;
    return;
  }
  c.innerHTML=`<div class="albums-grid">${albums.map(a=>albumCardHtml(a)).join('')}</div>`;
}

function albumCardHtml(a) {
  const needs = 4-a.songCount;
  const sub = a.rating===null
    ? (needs>0?`${needs} more song${needs>1?'s':''} to unlock`:`N/A`)
    : '';
  return `<div class="album-card" onclick="showAlbumDetail('${escHtml(a.album)}','${escHtml(a.artist)}')">
    <div class="ac-art">♪</div>
    <div class="ac-title" title="${escHtml(a.album)}">${escHtml(a.album)}</div>
    <div class="ac-artist">${escHtml(a.artist)}</div>
    <div class="ac-footer">
      <span class="ac-count">${a.songCount} song${a.songCount!==1?'s':''}</span>
      ${ratingChipHtml(a.rating)}
    </div>
    ${sub?`<div style="font-size:10px;color:var(--text3);margin-top:6px">${sub}</div>`:''}
  </div>`;
}

function showAlbumsMain() {
  document.getElementById('albums-main').style.display='';
  document.getElementById('album-detail').style.display='none';
}

function showAlbumDetail(album, artist) {
  document.getElementById('albums-main').style.display='none';
  const det = document.getElementById('album-detail');
  det.style.display='';

  const albumSongs = songs.filter(s=>
    s.album.toLowerCase()===album.toLowerCase()&&
    s.artist.toLowerCase()===artist.toLowerCase()
  );
  const ratings = albumSongs.map(s=>s.rating);
  const r = ratings.length>=4 ? Math.round(avg(ratings)*10)/10 : null;

  const sorted = [...albumSongs].sort((a,b)=>b.rating-a.rating);

  det.innerHTML=`
    <button class="detail-back" onclick="showAlbumsMain()">← Back to albums</button>
    <div class="detail-header">
      <h2>${escHtml(album)}</h2>
      <p>${escHtml(artist)}</p>
      <div class="big-rating">${ratingChipHtml(r)} ${r===null?`<span style="font-size:12px;color:var(--text3)">(need ${4-ratings.length} more song${4-ratings.length!==1?'s':''})</span>`:''}</div>
    </div>
    <div class="section-heading">${albumSongs.length} rated song${albumSongs.length!==1?'s':''}</div>
    <div class="song-list" style="border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)">
      ${sorted.map(s=>songRowHtml(s,false)).join('')}
    </div>`;
}

// ── ARTISTS PAGE ─────────────────────────────────────────────────────────
function buildArtists() {
  const map = {};
  songs.forEach(s=>{
    const k = s.artist.toLowerCase();
    if(!map[k]) map[k]={artist:s.artist,songs:[]};
    map[k].songs.push(s);
  });
  return Object.values(map).map(a=>{
    const ratings = a.songs.map(s=>s.rating);
    const r = ratings.length>=5 ? avg(ratings) : null;
    return {...a, rating:r?Math.round(r*10)/10:null, songCount:ratings.length};
  });
}

function renderArtists() {
  let artists = buildArtists();
  const sort = document.getElementById('artist-sort').value;
  if(sort==='rating-desc') artists.sort((a,b)=>(b.rating??-1)-(a.rating??-1));
  else if(sort==='rating-asc') artists.sort((a,b)=>(a.rating??99)-(b.rating??99));
  else artists.sort((a,b)=>a.artist.localeCompare(b.artist));

  const c = document.getElementById('artists-grid');
  if(!artists.length){
    c.innerHTML=`<div class="empty"><p>No artists yet.</p></div>`;
    return;
  }
  c.innerHTML=`<div class="artists-grid">${artists.map(a=>artistCardHtml(a)).join('')}</div>`;
}

function artistCardHtml(a) {
  const needs = 5-a.songCount;
  return `<div class="artist-card" onclick="showArtistDetail('${escHtml(a.artist)}')">
    <div class="artist-avatar">${escHtml(initials(a.artist))}</div>
    <div class="artist-name">${escHtml(a.artist)}</div>
    <div class="artist-meta">
      ${a.songCount} song${a.songCount!==1?'s':''}
      ${a.rating===null&&needs>0?` · ${needs} more to unlock`:''}
    </div>
    <div style="margin-top:8px">${ratingChipHtml(a.rating)}</div>
  </div>`;
}

function showArtistsMain() {
  document.getElementById('artists-main').style.display='';
  document.getElementById('artist-detail').style.display='none';
  document.getElementById('artist-album-detail').style.display='none';
}

function showArtistDetail(artist) {
  document.getElementById('artists-main').style.display='none';
  document.getElementById('artist-album-detail').style.display='none';
  const det = document.getElementById('artist-detail');
  det.style.display='';

  const artistSongs = songs.filter(s=>s.artist.toLowerCase()===artist.toLowerCase());
  const ratings = artistSongs.map(s=>s.rating);
  const r = ratings.length>=5 ? Math.round(avg(ratings)*10)/10 : null;

  // build albums for this artist
  const albumMap = {};
  artistSongs.forEach(s=>{
    const k = s.album.toLowerCase();
    if(!albumMap[k]) albumMap[k]={album:s.album,songs:[]};
    albumMap[k].songs.push(s);
  });
  const albums = Object.values(albumMap).map(a=>{
    const ar = a.songs.map(s=>s.rating);
    return {...a, rating:ar.length>=4?Math.round(avg(ar)*10)/10:null, songCount:ar.length};
  }).sort((a,b)=>(b.rating??-1)-(a.rating??-1));

  det.innerHTML=`
    <button class="detail-back" onclick="showArtistsMain()">← Back to artists</button>
    <div class="detail-header">
      <h2>${escHtml(artist)}</h2>
      <p>${artistSongs.length} song${artistSongs.length!==1?'s':''} rated</p>
      <div class="big-rating">${ratingChipHtml(r)} ${r===null&&5-ratings.length>0?`<span style="font-size:12px;color:var(--text3)">(need ${5-ratings.length} more song${5-ratings.length!==1?'s':''})</span>`:''}</div>
    </div>
    <div class="section-heading" style="margin-bottom:12px">Albums</div>
    <div class="albums-grid">
      ${albums.map(a=>
        `<div class="album-card" onclick="showArtistAlbumDetail('${escHtml(a.album)}','${escHtml(artist)}')">
          <div class="ac-art">♪</div>
          <div class="ac-title">${escHtml(a.album)}</div>
          <div class="ac-footer">
            <span class="ac-count">${a.songCount} song${a.songCount!==1?'s':''}</span>
            ${ratingChipHtml(a.rating)}
          </div>
          ${a.rating===null&&4-a.songCount>0?`<div style="font-size:10px;color:var(--text3);margin-top:6px">${4-a.songCount} more to unlock</div>`:''}
        </div>`
      ).join('')}
    </div>`;
}

function showArtistAlbumDetail(album, artist) {
  document.getElementById('artist-detail').style.display='none';
  const det = document.getElementById('artist-album-detail');
  det.style.display='';

  const albumSongs = songs.filter(s=>
    s.album.toLowerCase()===album.toLowerCase()&&
    s.artist.toLowerCase()===artist.toLowerCase()
  );
  const ratings = albumSongs.map(s=>s.rating);
  const r = ratings.length>=4 ? Math.round(avg(ratings)*10)/10 : null;
  const sorted = [...albumSongs].sort((a,b)=>b.rating-a.rating);

  det.innerHTML=`
    <button class="detail-back" onclick="showArtistDetail('${escHtml(artist)}')">← Back to ${escHtml(artist)}</button>
    <div class="detail-header">
      <h2>${escHtml(album)}</h2>
      <p>${escHtml(artist)}</p>
      <div class="big-rating">${ratingChipHtml(r)}</div>
    </div>
    <div class="section-heading">${albumSongs.length} rated song${albumSongs.length!==1?'s':''}</div>
    <div class="song-list" style="border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)">
      ${sorted.map(s=>songRowHtml(s,false)).join('')}
    </div>`;
}

// ── INIT ─────────────────────────────────────────────────────────────────
renderRecent();
</script>
</body>
</html>
